<svg width="100%" viewBox="0 0 680 1816" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Case Trigger Framework architecture</title>
<desc>Three diagrams: the five lanes and their roles; the registered Case actions for every trigger event; and the full transaction path from trigger entry to retry.</desc>
<defs>
<style>
text{font-family:'Anthropic Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
.th{font-weight:500;font-size:14px}
.ts{font-weight:400;font-size:12px}
.title{font-weight:500;font-size:16px;fill:#2C2C2A}
.cap{font-weight:400;font-size:12px;fill:#5F5E5A}
.bg-gray>rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.bg-teal>rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.bg-gray .th{fill:#2C2C2A}.bg-gray .ts{fill:#5F5E5A}
.bg-teal .th{fill:#04342C}.bg-teal .ts{fill:#0F6E56}
.arr{stroke:#5F5E5A;stroke-width:1.5;fill:none}
.divln{stroke:#B4B2A9;stroke-width:0.5}
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="1816" fill="#FFFFFF"/>

<text x="40" y="30" style="font-size:18px;font-weight:500;fill:#2C2C2A">Case Trigger Framework — architecture</text>
<g class="bg-gray"><rect x="40" y="44" width="12" height="12" rx="2"/></g>
<text class="cap" x="58" y="54">TAF / framework</text>
<g class="bg-teal"><rect x="200" y="44" width="12" height="12" rx="2"/></g>
<text class="cap" x="218" y="54">this framework</text>

<text class="title" x="40" y="80">1 · The five lanes</text>
<line class="divln" x1="40" y1="88" x2="640" y2="88"/>

<g class="bg-gray"><rect x="90" y="98" width="500" height="46" rx="8"/>
<text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central">Lane 1 · Dispatch</text>
<text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">order, bypass, route (TAF)</text></g>
<g class="bg-teal"><rect x="90" y="156" width="500" height="46" rx="8"/>
<text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">Lane 2 · Adapters</text>
<text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">thin; unpack and call a service</text></g>
<g class="bg-teal"><rect x="90" y="214" width="500" height="46" rx="8"/>
<text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central">Lane 3 · Services</text>
<text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">business rules, testable</text></g>
<g class="bg-teal"><rect x="90" y="272" width="500" height="46" rx="8"/>
<text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">Lane 4 · Data access</text>
<text class="ts" x="340" y="306" text-anchor="middle" dominant-baseline="central">selector + unit of work</text></g>
<g class="bg-teal"><rect x="90" y="330" width="500" height="46" rx="8"/>
<text class="th" x="340" y="348" text-anchor="middle" dominant-baseline="central">Lane 5 · Async tail</text>
<text class="ts" x="340" y="364" text-anchor="middle" dominant-baseline="central">buffer, dispatcher, queueable, retry</text></g>
<g class="bg-teal"><rect x="90" y="388" width="500" height="46" rx="8"/>
<text class="th" x="340" y="406" text-anchor="middle" dominant-baseline="central">Cross-cutting</text>
<text class="ts" x="340" y="422" text-anchor="middle" dominant-baseline="central">recursion, logging, error pipeline</text></g>

<text class="title" x="40" y="472">2 · Registered actions by trigger event</text>
<line class="divln" x1="40" y1="480" x2="640" y2="480"/>
<text class="th" x="135" y="498" text-anchor="middle" dominant-baseline="central">Trigger event</text>
<text class="th" x="410" y="498" text-anchor="middle" dominant-baseline="central">Registered actions (by Order__c)</text>

<g class="bg-gray"><rect x="60" y="512" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="531" text-anchor="middle" dominant-baseline="central">before insert</text></g>
<g class="bg-teal"><rect x="220" y="512" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="531" dominant-baseline="central">o5 Flow SetDefaults · o10 Apex SetRefund</text></g>

<g class="bg-gray"><rect x="60" y="558" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="577" text-anchor="middle" dominant-baseline="central">before update</text></g>
<g class="bg-teal"><rect x="220" y="558" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="577" dominant-baseline="central">o10 Apex SetRefund → CaseRefundService</text></g>

<g class="bg-gray"><rect x="60" y="604" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="623" text-anchor="middle" dominant-baseline="central">before delete</text></g>
<g class="bg-teal"><rect x="220" y="604" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="623" dominant-baseline="central">o10 Apex PreventDeleteIfClosed</text></g>

<g class="bg-gray"><rect x="60" y="650" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="669" text-anchor="middle" dominant-baseline="central">after insert</text></g>
<g class="bg-teal"><rect x="220" y="650" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="669" dominant-baseline="central">o20 Apex DisruptionNotification → register</text></g>

<g class="bg-gray"><rect x="60" y="696" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="715" text-anchor="middle" dominant-baseline="central">after update</text></g>
<g class="bg-teal"><rect x="220" y="696" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="715" dominant-baseline="central">o20 Apex Notification · o30 Flow LogDisruption</text></g>

<g class="bg-gray"><rect x="60" y="742" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="761" text-anchor="middle" dominant-baseline="central">after delete</text></g>
<g class="bg-teal"><rect x="220" y="742" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="761" dominant-baseline="central">o20 Apex AfterDelete_Audit → AppLogger</text></g>

<g class="bg-gray"><rect x="60" y="788" width="150" height="38" rx="6"/>
<text class="ts" x="135" y="807" text-anchor="middle" dominant-baseline="central">after undelete</text></g>
<g class="bg-gray"><rect x="220" y="788" width="380" height="38" rx="6"/>
<text class="ts" x="234" y="807" dominant-baseline="central">(no actions registered — context wired, empty)</text></g>

<text class="title" x="40" y="864">3 · Full transaction path (entry to retry)</text>
<line class="divln" x1="40" y1="872" x2="640" y2="872"/>

<g class="bg-gray"><rect x="110" y="884" width="460" height="50" rx="8"/>
<text class="th" x="340" y="903" text-anchor="middle" dominant-baseline="central">CaseTrigger → MetadataTriggerHandler.run()</text>
<text class="ts" x="340" y="920" text-anchor="middle" dominant-baseline="central">entry, object bypass, recursion stack</text></g>
<line x1="340" y1="934" x2="340" y2="950" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="950" width="460" height="50" rx="8"/>
<text class="th" x="340" y="969" text-anchor="middle" dominant-baseline="central">getActionMetadata(context)</text>
<text class="ts" x="340" y="986" text-anchor="middle" dominant-baseline="central">query Trigger_Action + Setting</text></g>
<line x1="340" y1="1000" x2="340" y2="1016" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="1016" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1035" text-anchor="middle" dominant-baseline="central">shouldExecute() gate</text>
<text class="ts" x="340" y="1052" text-anchor="middle" dominant-baseline="central">entry criteria, permissions</text></g>
<line x1="340" y1="1066" x2="340" y2="1082" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1082" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1101" text-anchor="middle" dominant-baseline="central">before-actions (ordered)</text>
<text class="ts" x="340" y="1118" text-anchor="middle" dominant-baseline="central">Flow o5, Apex o10</text></g>
<line x1="340" y1="1132" x2="340" y2="1148" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="1148" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1167" text-anchor="middle" dominant-baseline="central">record saved / deleted</text>
<text class="ts" x="340" y="1184" text-anchor="middle" dominant-baseline="central">platform persists field changes</text></g>
<line x1="340" y1="1198" x2="340" y2="1214" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1214" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1233" text-anchor="middle" dominant-baseline="central">after-actions (ordered)</text>
<text class="ts" x="340" y="1250" text-anchor="middle" dominant-baseline="central">Apex o20, Flow o30</text></g>
<line x1="340" y1="1264" x2="340" y2="1280" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1280" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1299" text-anchor="middle" dominant-baseline="central">register in buffer</text>
<text class="ts" x="340" y="1316" text-anchor="middle" dominant-baseline="central">AsyncWorkBuffer.register CaseNotify</text></g>
<line x1="340" y1="1330" x2="340" y2="1346" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="1346" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1365" text-anchor="middle" dominant-baseline="central">cascade ends → finalizer</text>
<text class="ts" x="340" y="1382" text-anchor="middle" dominant-baseline="central">getAll DML_Finalizer__mdt</text></g>
<line x1="340" y1="1396" x2="340" y2="1412" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1412" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1431" text-anchor="middle" dominant-baseline="central">AsyncDispatcher.execute()</text>
<text class="ts" x="340" y="1448" text-anchor="middle" dominant-baseline="central">drain de-duped keys</text></g>
<line x1="340" y1="1462" x2="340" y2="1478" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1478" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1497" text-anchor="middle" dominant-baseline="central">resolve factory</text>
<text class="ts" x="340" y="1514" text-anchor="middle" dominant-baseline="central">Async_Work__mdt, Type.forName</text></g>
<line x1="340" y1="1528" x2="340" y2="1544" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1544" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1563" text-anchor="middle" dominant-baseline="central">enqueue or overflow</text>
<text class="ts" x="340" y="1580" text-anchor="middle" dominant-baseline="central">limit → durable log</text></g>
<line x1="340" y1="1594" x2="340" y2="1610" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="1610" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1629" text-anchor="middle" dominant-baseline="central">transaction commits</text>
<text class="ts" x="340" y="1646" text-anchor="middle" dominant-baseline="central">events survive rollback</text></g>
<line x1="340" y1="1660" x2="340" y2="1676" class="arr" marker-end="url(#arrow)"/>
<g class="bg-teal"><rect x="110" y="1676" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1695" text-anchor="middle" dominant-baseline="central">CaseNotificationQueueable</text>
<text class="ts" x="340" y="1712" text-anchor="middle" dominant-baseline="central">selector, work, finalizer</text></g>
<line x1="340" y1="1726" x2="340" y2="1742" class="arr" marker-end="url(#arrow)"/>
<g class="bg-gray"><rect x="110" y="1742" width="460" height="50" rx="8"/>
<text class="th" x="340" y="1761" text-anchor="middle" dominant-baseline="central">error pipeline</text>
<text class="ts" x="340" y="1778" text-anchor="middle" dominant-baseline="central">publish → log → retry (×3)</text></g>
</svg>
